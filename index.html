<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilería JavaScript</title>

    <link rel="stylesheet" href="Css/styles.css">

    <script src="Js/libreria.js"></script>
    <script src="Js/index.js" defer></script>
</head>
<body>

<div class="contenedor">

    <h1>Utilería JavaScript</h1>

    <form id="formulario">

        <label>Nombre</label>
        <input type="text" id="nombre" required>

        <label>Fecha de nacimiento</label>
        <input type="date" id="fechaNacimiento" required>

        <label>Número (máximo 5 dígitos)</label>
        <input type="number" id="numero" required>

        <label>Texto libre</label>
        <input type="text" id="textoLibre">

        <label>Número para validar si es par</label>
        <input type="number" id="numeroPar">

        <button type="submit">Enviar</button>

    </form>

</div>

<div id="modal" class="modal">

    <div class="modal-contenido">

        <span id="cerrar">&times;</span>

        <h2>Edad Calculada</h2>

        <p id="resultadoEdad"></p>

    </div>

</div>

</body>
</html>
